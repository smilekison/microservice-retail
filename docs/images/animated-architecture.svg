<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <style>
      .box{fill:#0b69ff;stroke:#05316a;stroke-width:2;rx:8;}
      .text{fill:#fff;font-family:Arial,Helvetica,sans-serif;font-size:14px}
      .pulse{fill:#ffcc00; opacity:0.9}
    </style>
  </defs>
  <!-- UI -->
  <rect class="box" x="40" y="40" width="180" height="80" rx="8" />
  <text x="130" y="85" text-anchor="middle" class="text">UI</text>
  <!-- Catalog -->
  <rect class="box" x="310" y="20" width="180" height="80" rx="8" />
  <text x="400" y="55" text-anchor="middle" class="text">Catalog</text>
  <!-- Cart -->
  <rect class="box" x="310" y="120" width="180" height="80" rx="8" />
  <text x="400" y="160" text-anchor="middle" class="text">Cart</text>
  <!-- Orders -->
  <rect class="box" x="580" y="70" width="180" height="80" rx="8" />
  <text x="670" y="115" text-anchor="middle" class="text">Orders</text>

  <!-- Connections -->
  <line x1="220" y1="80" x2="310" y2="60" stroke="#9aa6ff" stroke-width="3" />
  <line x1="490" y1="60" x2="580" y2="110" stroke="#9aa6ff" stroke-width="3" />
  <line x1="490" y1="160" x2="580" y2="110" stroke="#9aa6ff" stroke-width="3" />

  <!-- Datastores -->
  <g>
    <rect x="300" y="-20" width="220" height="20" fill="transparent" />
    <circle class="pulse" cx="400" cy="-10" r="6">
      <animate attributeName="r" values="6;14;6" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.2s" repeatCount="indefinite" />
    </circle>
    <text x="450" y="-6" class="text">Datastores</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="20" y="150" width="760" height="60" fill="#f6f8ff" rx="8" stroke="#e2e8ff" />
    <text x="40" y="175" class="text" style="fill:#111;font-size:12px;">Animated architecture overview: boxes are services, lines are network paths. The pulsing node indicates datastore activity/traffic.</text>
  </g>
</svg>
