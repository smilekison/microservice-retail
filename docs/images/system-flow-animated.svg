<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <style>
      .user-box { fill: #4CAF50; stroke: #2E7D32; stroke-width: 2; }
      .service-box { fill: #2196F3; stroke: #1565C0; stroke-width: 2; }
      .db-box { fill: #FF9800; stroke: #E65100; stroke-width: 2; }
      .text-label { fill: #fff; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .text-small { fill: #fff; font-family: Arial, sans-serif; font-size: 12px; }
      .arrow-line { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
      .pulse-dot { fill: #FFD700; }
      .response-line { stroke: #9C27B0; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead-purple); }
    </style>

    <!-- Arrow markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9C27B0" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" style="font-size: 24px; font-weight: bold; fill: #333;">Microservice-Retail System Flow</text>

  <!-- User/Client -->
  <rect class="user-box" x="50" y="80" width="120" height="80" rx="5" />
  <text x="110" y="115" text-anchor="middle" class="text-label">Browser/Client</text>
  <text x="110" y="135" text-anchor="middle" class="text-small">(User)</text>

  <!-- UI Service -->
  <rect class="service-box" x="250" y="80" width="120" height="80" rx="5" />
  <text x="310" y="115" text-anchor="middle" class="text-label">UI Service</text>
  <text x="310" y="135" text-anchor="middle" class="text-small">(Java)</text>

  <!-- Catalog Service -->
  <rect class="service-box" x="450" y="80" width="120" height="80" rx="5" />
  <text x="510" y="115" text-anchor="middle" class="text-label">Catalog</text>
  <text x="510" y="135" text-anchor="middle" class="text-small">(Go)</text>

  <!-- Cart Service -->
  <rect class="service-box" x="650" y="80" width="120" height="80" rx="5" />
  <text x="710" y="115" text-anchor="middle" class="text-label">Cart</text>
  <text x="710" y="135" text-anchor="middle" class="text-small">(Java)</text>

  <!-- Orders Service -->
  <rect class="service-box" x="850" y="80" width="120" height="80" rx="5" />
  <text x="910" y="115" text-anchor="middle" class="text-label">Orders</text>
  <text x="910" y="135" text-anchor="middle" class="text-small">(Java)</text>

  <!-- Checkout Service -->
  <rect class="service-box" x="1050" y="80" width="120" height="80" rx="5" />
  <text x="1110" y="115" text-anchor="middle" class="text-label">Checkout</text>
  <text x="1110" y="135" text-anchor="middle" class="text-small">(Node.js)</text>

  <!-- Databases Row -->
  <text x="50" y="280" style="font-size: 12px; fill: #666; font-weight: bold;">Persistence Layer:</text>

  <!-- MySQL DB -->
  <rect class="db-box" x="450" y="320" width="120" height="70" rx="5" />
  <text x="510" y="350" text-anchor="middle" class="text-label">MySQL</text>
  <text x="510" y="368" text-anchor="middle" class="text-small">Catalog DB</text>

  <!-- DynamoDB -->
  <rect class="db-box" x="650" y="320" width="120" height="70" rx="5" />
  <text x="710" y="350" text-anchor="middle" class="text-label">DynamoDB</text>
  <text x="710" y="368" text-anchor="middle" class="text-small">Cart Data</text>

  <!-- RDS -->
  <rect class="db-box" x="850" y="320" width="120" height="70" rx="5" />
  <text x="910" y="350" text-anchor="middle" class="text-label">RDS</text>
  <text x="910" y="368" text-anchor="middle" class="text-small">Orders DB</text>

  <!-- Request Flow Section -->
  <text x="50" y="470" style="font-size: 12px; fill: #666; font-weight: bold;">Request Flow (User Browsing):</text>

  <!-- Step 1: User to UI -->
  <line class="arrow-line" x1="170" y1="120" x2="250" y2="120" />
  <circle class="pulse-dot" cx="210" cy="120" r="4">
    <animate attributeName="r" values="4;8;4" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <text x="210" y="105" text-anchor="middle" style="font-size: 11px; fill: #666;">1. Load</text>

  <!-- Step 2: UI to Catalog -->
  <line class="arrow-line" x1="370" y1="110" x2="450" y2="110" />
  <text x="410" y="105" text-anchor="middle" style="font-size: 11px; fill: #666;">2. GET /products</text>

  <!-- Step 3: Catalog to MySQL -->
  <line class="arrow-line" x1="510" y1="160" x2="510" y2="320" />
  <text x="535" y="240" style="font-size: 11px; fill: #666;">3. Query</text>

  <!-- Step 3a: MySQL Response -->
  <line class="response-line" x1="520" y1="320" x2="520" y2="160" />
  <text x="545" y="240" style="font-size: 11px; fill: #9C27B0;">Response</text>

  <!-- Step 4: UI response to User -->
  <line class="response-line" x1="250" y1="130" x2="170" y2="130" />
  <text x="210" y="148" text-anchor="middle" style="font-size: 11px; fill: #9C27B0;">4. HTML/JSON</text>

  <!-- Step 5: User clicks Add to Cart -->
  <line class="arrow-line" x1="170" y1="150" x2="250" y2="150" />
  <text x="210" y="170" text-anchor="middle" style="font-size: 11px; fill: #666;">5. Add Item</text>

  <!-- Step 6: UI to Cart -->
  <line class="arrow-line" x1="370" y1="140" x2="650" y2="110" />
  <text x="510" y="130" style="font-size: 11px; fill: #666;">6. POST /cart</text>

  <!-- Step 7: Cart to DynamoDB -->
  <line class="arrow-line" x1="710" y1="160" x2="710" y2="320" />
  <text x="735" y="240" style="font-size: 11px; fill: #666;">7. Store</text>

  <!-- Step 7a: DynamoDB Response -->
  <line class="response-line" x1="700" y1="320" x2="700" y2="160" />
  <text x="675" y="240" style="font-size: 11px; fill: #9C27B0;">Status</text>

  <!-- Step 8: Checkout -->
  <line class="arrow-line" x1="770" y1="130" x2="1050" y2="130" />
  <circle class="pulse-dot" cx="910" cy="130" r="4">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <text x="910" y="115" text-anchor="middle" style="font-size: 11px; fill: #666;">8. Checkout</text>

  <!-- Step 9: Checkout to Orders -->
  <line class="arrow-line" x1="1050" y1="140" x2="970" y2="120" />
  <text x="1010" y="155" style="font-size: 11px; fill: #666;">9. Create Order</text>

  <!-- Step 10: Orders to RDS -->
  <line class="arrow-line" x1="910" y1="160" x2="910" y2="320" />
  <text x="935" y="240" style="font-size: 11px; fill: #666;">10. Save</text>

  <!-- Architecture Section -->
  <text x="50" y="550" style="font-size: 12px; fill: #666; font-weight: bold;">Architecture Components:</text>

  <!-- Container Layer -->
  <rect x="50" y="570" width="1100" height="100" fill="none" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5" rx="5" />
  <text x="60" y="590" style="font-size: 11px; fill: #666;">Docker Containers / Kubernetes Pods</text>

  <text x="80" y="630" style="font-size: 11px; fill: #333; font-weight: bold;">• Multi-language services (Java, Go, Node.js)</text>
  <text x="80" y="650" style="font-size: 11px; fill: #333; font-weight: bold;">• Independent databases (MySQL, DynamoDB, RDS)</text>

  <!-- Legend -->
  <text x="50" y="690" style="font-size: 11px; fill: #666;">🟢 Green = Client  🔵 Blue = Microservice  🟠 Orange = Database  ⚡ Pulsing = Active Request</text>
</svg>